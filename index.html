<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Estudiantes</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <main>
  <h1>Registro de Estudiantes</h1>

  <form id="formulario">
    <input class="campoNombre" name="nombre" placeholder="Nombre" required>
    <input class="campoCorreo" name="correo" type="email" placeholder="Correo" required>
    <select class="cuadroJornada" name="jornada">
      <option value="Matutina">Matutina</option>
      <option value="Vespertina">Vespertina</option>
      <option value="Nocturna">Nocturna</option>
    </select>
    <button class="btn-agregar" type="submit">Agregar</button>
  </form>

  <p id="error" style="color:red"></p>
  <ul id="lista" class="lista"></ul>
  <button id="guardar">Guardar en JSON</button>
</main>
  <script type="module" src="dist/app.js"></script>
</body>
</html>
